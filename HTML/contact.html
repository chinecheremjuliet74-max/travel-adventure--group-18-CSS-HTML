<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JojiaTravelAgency</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section class="contact">
    <div class="contact-container">

        <div class="contact-form">
            <h2>Plan Your Journey</h2>

            <form>
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email Address" required>
                <input type="tel" placeholder="Phone Number">

                <select required>
                    <option value="">Preferred Destination</option>
                    <option>Paris</option>
                    <option>Dubai</option>
                    <option>Bali</option>
                    <option>Cape Town</option>
                </select>

                <div class="date-group">
                    <input type="date">
                    <input type="date">
                </div>

                <input type="number" placeholder="Number of Travelers">

                <select>
                    <option value="">Budget Range</option>
                    <option>$500 - $1000</option>
                    <option>$1000 - $3000</option>
                    <option>$3000+</option>
                </select>

                <textarea placeholder="Special Requests"></textarea>

                <button type="submit">Send Inquiry</button>
            </form>
        </div>

        <div class="contact-info">
            <h2>Contact Information</h2>

            <p><strong>📍 Address:</strong> 12 Travel Road, Lagos</p>
            <p><strong>📞 Phone:</strong> +234 800 123 4567</p>
            <p><strong>📧 Email:</strong> info@travelagency.com</p>
            <p><strong>⏰ Hours:</strong> Mon - Fri (9am - 6pm)</p>

            <div class="socials">
                <a href="#">Facebook</a>
                <a href="#">Instagram</a>
                <a href="#">Twitter</a>
            </div>
        </div>

    </div>

    <div class="map">
        <iframe 
            src="https://maps.google.com/maps?q=lagos&t=&z=13&ie=UTF8&iwloc=&output=embed">
        </iframe>
    </div>
</section>
</body>
</html>
